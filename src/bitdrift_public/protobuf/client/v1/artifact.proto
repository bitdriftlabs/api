syntax = "proto3";

package bitdrift_public.protobuf.client.v1;

import "bitdrift_public/protobuf/client/v1/feature_flag.proto";
import "bitdrift_public/protobuf/logging/v1/payload.proto";
import "google/protobuf/timestamp.proto";

enum StorageFormat {
  CHECKSUMMED = 0;
  RAW = 1;
}

// the upload manager to coordinate intents and uploads.
message ArtifactUploadIndex {
  message Artifact {
    // Name of the file to upload.
    string name = 1;
    // The time associated with this artifact, e.g. when the data was captured.
    google.protobuf.Timestamp time = 2;
    // Whether this artifact requires intent negotiation. If intent negotiation resulted
    // in us rejecting the upload, the artifact will be removed from the local cache, so
    // this being true means that the file should be uploaded.
    bool pending_intent_negotiation = 3;

    // Additional metadata about the artifact beyond what is available in the file itself. This is sent as part of the intent negotation process to help the server make a decision about whether to accept the upload or not.
    // For issue reports this corresponds to the "fields" associated with the issue report.
    map<string, bitdrift_public.protobuf.logging.v1.Data> metadata = 5;

    // The session ID associated with this artfact, if applicable. This will be empty for artifacts that are not associated with a session, like state snapshots that may span sessions.
    string session_id = 6;

    // The feature flags that were active when this artifact was captured. This is used by issue reports to allow the feature flags to be captured independently of the report.
    repeated FeatureFlag feature_flags = 7;

    // The type of the artifact, e.g. "client_report", "state_snapshot", etc. This is used by the server to determine how to process the artifact. For backwards compatibility, if this is absent the artifact is an issue report.
    optional string type_id = 8;

    // The storage format of the artifact, which determines whether we apply checksum validation during processing.
    StorageFormat storage_format = 9;
  }

  // List of files, in order of time, that are pending upload.
  repeated Artifact artifact = 1;
}
