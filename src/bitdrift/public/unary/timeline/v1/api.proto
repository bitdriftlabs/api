syntax = "proto3";

package bitdrift.public.unary.timeline.v1;

import "bitdrift/public/unary/timeline/v1/hydration.proto";
import "bitdrift/public/unary/timeline/v1/info.proto";
import "bitdrift/public/unary/timeline/v1/logs.proto";
import "bitdrift/public/unary/timeline/v1/search.proto";

// Provides access to session timeline data, including logs, metadata, and hydration state.
service TimelineService {
  // Retrieves the logs for a session.
  //
  // Returns the gRPC NOT_FOUND status if the session has not been hydrated yet.
  rpc GetSessionLogs(.bitdrift.public.unary.timeline.v1.GetSessionLogsRequest) returns (.bitdrift.public.unary.timeline.v1.GetSessionLogsResponse);

  // Retrieves metadata and attributes for a session.
  //
  // Returns the gRPC NOT_FOUND status if the session has not been hydrated yet.
  rpc GetSessionInfo(.bitdrift.public.unary.timeline.v1.GetSessionInfoRequest) returns (.bitdrift.public.unary.timeline.v1.GetSessionInfoResponse);

  // Triggers hydration of a session.
  //
  // Hydration prepares session data for querying. Can also be used to force
  // re-hydration of an already hydrated session.
  rpc HydrateSession(.bitdrift.public.unary.timeline.v1.HydrateSessionRequest) returns (.bitdrift.public.unary.timeline.v1.HydrateSessionResponse);

  // Retrieves the hydration status of a session.
  //
  // Returns the gRPC NOT_FOUND status if hydration has not been triggered for the
  // session yet.
  rpc GetHydrationStatus(.bitdrift.public.unary.timeline.v1.GetHydrationStatusRequest) returns (.bitdrift.public.unary.timeline.v1.GetHydrationStatusResponse);

  // Performs an advanced search across logs in a session.
  //
  // Supports filtering by field values, log types, log levels, and full-text
  // content using a flexible query model with AND/OR logic.
  //
  // Returns the gRPC NOT_FOUND status if the session has not been hydrated yet.
  rpc AdvancedSearchSession(.bitdrift.public.unary.timeline.v1.SessionAdvancedSearchRequest) returns (.bitdrift.public.unary.timeline.v1.SessionAdvancedSearchResponse);
}
