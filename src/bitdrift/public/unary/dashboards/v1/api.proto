syntax = "proto3";

package bitdrift.public.unary.dashboards.v1;

import "bitdrift/public/shared/platform/v1/platform.proto";
import "bitdrift/public/shared/workflows/v1/time_series.proto";
import "bitdrift/public/unary/charts/v1/chart_id.proto";
import "bitdrift/public/unary/charts/v1/chart_metadata.proto";
import "bitdrift/public/unary/common/v1/common.proto";
import "google/protobuf/timestamp.proto";
import "validate/validate.proto";

// Metadata sufficient to render a single chart.
message ResolvedChart {
  // An opaque identifier object for the chart. This should be provided to the
  // data API in order to fetch/stream the data.
  .bitdrift.public.unary.charts.v1.ChartIdentifier id = 1 [(validate.rules).message = {required: true}];

  message Line {
    // If the line chart contains histograms with a top-K grouping, this
    // provides a best-effort list of suggested percentiles. The chart should
    // default to the 0th element in the list, and callers may override that
    // value via the chart API.
    //
    // If this list is empty, the chart does not have suggested default
    // percentile values, but callers may still choose a percentile via the
    // chart API.
    repeated float configurable_percentiles = 1;

    // Whether or not the chart supports selecting multiple percentiles at once. This will be false for
    // charts which contain grouped histograms or multiple histograms, and true for charts with a single histogram.
    bool supports_multiple_percentiles = 3;
  }

  message Funnel {}

  message Sankey {}

  message Table {
    // If the line chart corresponding to this table contains histograms with a
    // top-K grouping, this provides a best-effort list of suggested
    // percentiles. The chart should default to the 0th element in the list,
    // and callers may override that value via the chart API.
    //
    // If this list is empty, the chart does not have suggested default
    // percentile values, but callers may still choose a percentile via the
    // chart API.
    repeated float configurable_percentiles = 1;

    // Whether or not the chart supports selecting multiple percentiles at once. This will be false for
    // charts which contain grouped histograms or multiple histograms, and true for charts with a single histogram.
    bool supports_multiple_percentiles = 2;
  }

  // The type of chart.
  oneof type {
    option (validate.required) = true;
    // The chart is a line chart, rendering one or more time series.
    .bitdrift.public.unary.dashboards.v1.ResolvedChart.Line line = 2;

    // The chart is a funnel chart, rendering the data as a set of steps.
    .bitdrift.public.unary.dashboards.v1.ResolvedChart.Funnel funnel = 10;

    // The chart is a sankey chart, rendering the data as a set of connected nodes.
    .bitdrift.public.unary.dashboards.v1.ResolvedChart.Sankey sankey = 14;

    // The chart is a table chart, rendering the data as a set of rows and columns.
    .bitdrift.public.unary.dashboards.v1.ResolvedChart.Table table = 16;
  }

  // The display metadata for the chart.
  .bitdrift.public.unary.charts.v1.ChartMetadata metadata = 21;
}

message GetWorkflowChartsRequest {
  // The ID or slug of the workflow to fetch the dashboard for.
  string workflow_id_or_slug = 2 [
    (validate.rules).string.min_len = 1,
    (validate.rules).string.max_len = 4096
  ];
}

message GetWorkflowChartsResponse {
  repeated .bitdrift.public.unary.dashboards.v1.ResolvedChart charts = 1;
}

message InsightComparisonConfiguration {
  // The id of the first time series to compare against.
  string lhs_id = 1 [(validate.rules).string = {
    min_len: 1
    max_len: 255
  }];

  // The id of the second time series to compare against.
  string rhs_id = 2 [(validate.rules).string = {
    min_len: 1
    max_len: 255
  }];
}

message SankeyConfiguration {
  // The number of top-K paths to use when rendering the Sankey chart.
  // Defaults to 100 if not provided.
  uint64 top_k_paths = 1;

  // The compaction target size for the Sankey chart. If the chart exceeds this
  // value, `other` nodes are inserted to reduce the chart size. Defaults to 20
  // if not provided.
  uint64 compaction_target = 2;
}

message CounterConfiguration {
  // The aggregation to use when presenting counter values in a table.
  .bitdrift.public.shared.workflows.v1.Counter.CounterAggregationType aggregation_type = 1 [(validate.rules).enum = {defined_only: true}];
}

message RateConfiguration {
  // The aggregation to use when presenting rate values in a table.
  .bitdrift.public.shared.workflows.v1.Rate.RateAggregationType aggregation_type = 1 [(validate.rules).enum = {defined_only: true}];
}

message ChartRequest {
  // The identifier of the chart to fetch data for.
  .bitdrift.public.unary.charts.v1.ChartIdentifier chart_id = 1 [(validate.rules).message = {required: true}];

  // Optional configuration for any histogram values within the chart.
  .bitdrift.public.unary.charts.v1.HistogramConfiguration histogram_configuration = 2;

  // Optional configuration to indicate that this chart should compare two
  // insights time series.
  .bitdrift.public.unary.dashboards.v1.InsightComparisonConfiguration insight_comparison_configuration = 3;

  // Optional limit strategy to use for this chart. Currently supported only
  // for line charts. If omitted, a default top-K limit of 5 entries is used.
  .bitdrift.public.unary.charts.v1.LimitStrategy limit_strategy = 6;

  // Optional configuration for the sankey chart.
  .bitdrift.public.unary.dashboards.v1.SankeyConfiguration sankey_configuration = 7;

  // Counter configuration for the chart. Currently this is only used for resolving which table
  // type to show in the case of a group by query.
  .bitdrift.public.unary.dashboards.v1.CounterConfiguration counter_configuration = 8;

  // Rate configuration for the chart. Currently this is only used for resolving which table
  // type to show in the case of a group by query.
  .bitdrift.public.unary.dashboards.v1.RateConfiguration rate_configuration = 9;

  // Override the display mode for this chart.
  // Uses the same oneof structure as RuleChartConfiguration.display_mode.
  // If unset it will use the display mode defined in the workflow's rule chart configuration.
  oneof display_mode {
    .bitdrift.public.unary.charts.v1.ChartMetadata.MetricChartMetadata.TimeSeriesDisplayMode time_series_display_mode = 10;

    .bitdrift.public.unary.charts.v1.ChartMetadata.MetricChartMetadata.TableDisplayMode table_display_mode = 11;

    // This is only valid if all time series in the chart are histograms.
    .bitdrift.public.unary.charts.v1.ChartMetadata.MetricChartMetadata.HistogramBarChartDisplayMode histogram_bar_chart_display_mode = 12;
  }
}

message GetChartsDataRequest {
  // List of all charts to fetch data for.
  repeated .bitdrift.public.unary.dashboards.v1.ChartRequest charts = 1 [(validate.rules).repeated = {
    min_items: 1
    max_items: 100
  }];

  .bitdrift.public.unary.common.v1.TimeRange time_range = 8;

  // If this is empty, the platform filter for the workflow backing each chart will be used.
  repeated .bitdrift.public.shared.platform.v1.Platform platform_filter = 6 [(validate.rules).repeated.max_items = 25];

  // Optional filter to apply on top of the platform filter. This filter is
  // combined with the platform filter using a logical AND.
  .bitdrift.public.shared.workflows.v1.AndFilter and_filter = 7;
}

// Used for line charts. Each entry is a rendered time series for the request.
//
// For grouped charts, this response returns the visible grouped results, including the
// `TimeSeries.id` and `labels` pair that callers can reuse with
// `charts.v1.LimitStrategy.IdentifierMatch`.
message LineChartResponse {
  // The time series to render in the chart.
  repeated .bitdrift.public.shared.workflows.v1.TimeSeries time_series = 1;
}

message SankeyChartResponse {
  // A single state in the diagram.
  message Node {
    // The ID of the node.
    string id = 1 [(validate.rules).string.min_len = 1];

    // The name of the node.
    string name = 2;
  }

  // A connection between two nodes in a diagram.
  message Link {
    // The ID of the source node.
    string source_node_id = 1 [(validate.rules).string.min_len = 1];

    // The ID of the target node.
    string target_node_id = 2 [(validate.rules).string.min_len = 1];

    // The value of the link.
    uint64 value = 3;
  }

  // The nodes of the diagram.
  repeated .bitdrift.public.unary.dashboards.v1.SankeyChartResponse.Node nodes = 1;

  // The links of the diagram.
  repeated .bitdrift.public.unary.dashboards.v1.SankeyChartResponse.Link links = 2;
}

message TableChartResponse {
  // The tables to render for this chart.
  repeated .bitdrift.public.unary.dashboards.v1.Table tables = 1;
}

message Table {
  // Headers for the columns of each group by field (for example, "country", "device_type",
  // etc.). If there are no group by fields this will be empty.
  repeated string group_column_key_names = 1;

  // Headers for the columns that contain aggregated values (for example P99, Min, etc.).
  repeated string value_column_key_names = 2;

  // Each row in the table represents one unique combination of group-by columns.
  repeated .bitdrift.public.unary.dashboards.v1.TableRow rows = 3;

  // The unique devices for the entire table based on the TrackUnique configuration.
  optional uint64 unique_devices = 4;

  // The title of table, which is derived from the TimeSeries title in the rule chart config.
  string title = 5;

  // The total count of cardinality overflows for this time series that occurred during the
  // query time period.
  .bitdrift.public.shared.workflows.v1.CardinalityOverflows cardinality_overflows = 6;
}

message TableValue {
  // The numeric value for this cell.
  double value = 1;

  // For rate tables, returns the numerator and denominator values that yielded this value.
  .bitdrift.public.shared.workflows.v1.RateDetails rate_details = 2;
}

message TableRow {
  // Values that match `group_column_key_names`.
  repeated string group_column_values = 1;

  // Values that match `value_column_key_names`.
  repeated .bitdrift.public.unary.dashboards.v1.TableValue aggregated_values = 2;

  // The unique devices count based on the TrackUnique configuration.
  optional uint64 unique_devices = 3;
}

message FunnelChartResponse {
  // The funnel's steps.
  // The order of steps in the list corresponds to the order of metric IDs in
  // the stream funnels request. If there is no data available for any of the
  // metrics associated with a given funnel, the `steps` list is empty.
  repeated .bitdrift.public.unary.charts.v1.FunnelStep steps = 1;
}

message HistogramBarChartResponse {
  message Bucket {
    // The beginning of the range for this bucket, inclusive.
    double begin = 1;

    // The end of the range for this bucket, exclusive.
    double end = 2;

    // The count of values that fall within this bucket's range.
    uint64 count = 3;
  }

  message PerGroupBy {
    // The value of the dimension that this group represents.
    repeated string dimensions = 1;

    // The list of buckets for this histogram bar chart.
    repeated .bitdrift.public.unary.dashboards.v1.HistogramBarChartResponse.Bucket buckets = 2;

    // The unique devices for the entire table based on the TrackUnique configuration.
    optional uint64 unique_devices = 3;
  }

  message PerTimeSeries {
    // Headers for the columns of each group by field (for example, "country", "device_type",
    // etc.). If there are no group by fields this will be empty.
    repeated string dimension_names = 1;

    // The title of the histogram data, which is derived from the TimeSeries title in the rule chart
    // config.
    string title = 2;

    // The total count of cardinality overflows for this time series that occurred during the
    // query time period.
    .bitdrift.public.shared.workflows.v1.CardinalityOverflows cardinality_overflows = 3;

    // A set of buckets for every group by combination for this time series. If there are no group
    // by fields, there will be a single entry in this list.
    repeated .bitdrift.public.unary.dashboards.v1.HistogramBarChartResponse.PerGroupBy per_group_by = 4;
  }

  // Histogram data for each time series in the chart.
  repeated .bitdrift.public.unary.dashboards.v1.HistogramBarChartResponse.PerTimeSeries per_time_series = 1;
}

message ChartData {
  // The chart that this data belongs to.
  .bitdrift.public.unary.charts.v1.ChartIdentifier chart_id = 1 [(validate.rules).message = {required: true}];

  oneof chart_response {
    option (validate.required) = true;
    // Line-chart data for the chart.
    .bitdrift.public.unary.dashboards.v1.LineChartResponse line_data = 3;

    // Sankey-chart data for the chart.
    .bitdrift.public.unary.dashboards.v1.SankeyChartResponse sankey_data = 7;

    // Table data for the chart.
    .bitdrift.public.unary.dashboards.v1.TableChartResponse table_data = 8;

    // Funnel data for the chart.
    .bitdrift.public.unary.dashboards.v1.FunnelChartResponse funnel_data = 9;

    // Histogram-bar-chart data for the chart.
    .bitdrift.public.unary.dashboards.v1.HistogramBarChartResponse histogram_bar_chart_response = 10;

    // Contains an error message when chart data could not be retrieved.
    string error = 6;
  }
}

message GetChartsDataResponse {
  // Data for each of the requested data. The order of the data will match the
  // order of the chart ids in the request.
  repeated .bitdrift.public.unary.dashboards.v1.ChartData data = 1;
}

message GetUniqueAppIdsRequest {
  // The start of the time range to inspect. Defaults to 30 days before the
  // current time when unset.
  .google.protobuf.Timestamp start_time = 1;

  // The end of the time range to inspect. Defaults to the current time when
  // unset.
  .google.protobuf.Timestamp end_time = 2;

  // Optional platform selection criteria used to limit which platforms and apps
  // are included in the response.
  repeated .bitdrift.public.shared.platform.v1.Platform platform_filter = 4 [(validate.rules).repeated.max_items = 10];
}

message GetUniqueAppIdsResponse {
  // The distinct platform, app ID, and app version combinations observed in the
  // requested time range.
  repeated .bitdrift.public.shared.platform.v1.Platform platforms = 6;
}

// Provides access to dashboards and chart data, including layout and time series metrics.
service DashboardService {
  // Retrieves the chart configuration for a single workflow.
  //
  // Returns a list of all charts to be displayed for this workflow. The chart
  // IDs should be used to fetch the data.
  rpc GetWorkflowCharts(.bitdrift.public.unary.dashboards.v1.GetWorkflowChartsRequest) returns (.bitdrift.public.unary.dashboards.v1.GetWorkflowChartsResponse);

  // Retrieves chart data for one or more charts.
  //
  // Returns rendered chart output such as time-series values, labels, and table rows. For grouped
  // charts, callers can reuse each returned `TimeSeries.id` together with its full `labels` set to
  // build `charts.v1.LimitStrategy.IdentifierMatch` in a later request.
  rpc GetChartsData(.bitdrift.public.unary.dashboards.v1.GetChartsDataRequest) returns (.bitdrift.public.unary.dashboards.v1.GetChartsDataResponse);

  // Returns the distinct platform, app ID, and app version combinations seen in
  // the specified time range.
  rpc GetUniqueAppIds(.bitdrift.public.unary.dashboards.v1.GetUniqueAppIdsRequest) returns (.bitdrift.public.unary.dashboards.v1.GetUniqueAppIdsResponse);
}
