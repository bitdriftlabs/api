  repeated .bitdrift.public.shared.platform.v1.Platform platform_filter = 4 [(validate.rules).repeated.max_items = 10];
}

message GetUniqueAppIdsResponse {
  // The distinct platform, app ID, and app version combinations observed in the
  // requested time range.
  repeated .bitdrift.public.shared.platform.v1.Platform platforms = 6;
}

message DashboardStylisticComponent {
  message Divider {}

  message TextComponent {
    // The text to display in the component.
    string text = 1 [(validate.rules).string = {
      min_len: 1
      max_len: 5000
    }];

    // The variant of the text component, e.g. "h1", "h2", "p", etc.
    string variant = 2 [(validate.rules).string = {
      min_len: 1
      max_len: 50
    }];
  }

  oneof type {
    option (validate.required) = true;
    // A text component that displays a piece of text.
    .bitdrift.public.unary.dashboards.v1.DashboardStylisticComponent.TextComponent text_component = 1;

    // A divider component that can be used to separate sections of the dashboard.
    .bitdrift.public.unary.dashboards.v1.DashboardStylisticComponent.Divider divider = 2;
  }

  // The ID of the component. This is used to uniquely identify the component
  // within the dashboard. It is not required to be globally unique, but it must
  // be unique within the dashboard. Generated by the server when the component is created.
  string id = 3 [(validate.rules).string = {
    min_len: 1
    max_len: 100
  }];

  .bitdrift.public.unary.dashboards.v1.DashboardLayoutSettings dashboard_layout_settings = 4;
}

message DashboardVariable {
  oneof variable_type {
    option (validate.required) = true;
    // The value of the variable.
    .bitdrift.public.unary.workflows.v1.GroupBy.Value value = 3;
  }

  // The earliest time this variable was continuously deployed across all workflows.
  .google.protobuf.Timestamp earliest_contiguous_deployed_time = 2;
}

message ChartComponentLayout {
  .bitdrift.public.unary.charts.v1.ChartIdentifier chart_id = 1;

  .bitdrift.public.unary.dashboards.v1.DashboardLayoutSettings layout_settings = 2;

  .bitdrift.public.unary.charts.v1.ChartMetadata chart_metadata = 3;
}

message FavoriteCustomDashboardRequest {
  .bitdrift.public.unary.dashboards.v1.DashboardIdentifier identifier = 1;
}

message FavoriteCustomDashboardResponse {}

message UpsertCustomDashboardRequest {
  message DashboardTab {
    message Chart {
      // Optional ID of the chart being upsert. If not provided, the API will assume the chart needs to be created.
      optional string id = 1 [(validate.rules).string = {
        min_len: 1
        max_len: 100
      }];

      // The combination of chart identifier, layout, and metadata
      .bitdrift.public.unary.dashboards.v1.ChartComponentLayout chart_component_layout = 2;
    }

    // Optional ID of the tab being upsert. If not provided, the API will assume the tab needs to be created.
    optional string id = 1 [(validate.rules).string = {
      min_len: 1
      max_len: 100
    }];

    // The overlay of layout information for the charts in the dashboard. This array *MUST
    // include all components, whether they are being updated or not.
    repeated .bitdrift.public.unary.dashboards.v1.UpsertCustomDashboardRequest.DashboardTab.Chart charts = 2 [(validate.rules).repeated = {max_items: 500}];

    // List of all stylistic components that should be rendered on the dashboard. The array *MUST*
    // include all components, whether they are being updated or not.
    repeated .bitdrift.public.unary.dashboards.v1.DashboardStylisticComponent stylistic_components = 3 [(validate.rules).repeated = {max_items: 500}];

    // Optional display name/title for this dashboard tab. If unset, the tab will not have an explicit
    // stored name and clients may derive an appropriate default label when rendering.
    optional string name = 4 [(validate.rules).string = {
      min_len: 1
      max_len: 255
    }];
  }

  // If id is provided, the existing dashboard with this ID will be updated. If not provided, a new dashboard will be created.
  optional string id = 1 [(validate.rules).string = {
    min_len: 1
    max_len: 100
  }];

  string name = 2 [(validate.rules).string = {
    min_len: 1
    max_len: 255
  }];

  repeated .bitdrift.public.unary.dashboards.v1.UpsertCustomDashboardRequest.DashboardTab tabs = 3 [(validate.rules).repeated = {max_items: 100}];

  // The variables that are applied to every chart referenced in this dashboard.
  repeated .bitdrift.public.unary.workflows.v1.GroupBy.Value dashboard_variables = 5 [(validate.rules).repeated = {max_items: 10}];
}

message UpsertCustomDashboardResponse {
  .bitdrift.public.unary.dashboards.v1.Dashboard.CustomDashboard dashboard = 1;
}

message DeleteCustomDashboardRequest {
  string id = 1 [(validate.rules).string = {
    min_len: 1
    max_len: 100
  }];
}

message DeleteCustomDashboardResponse {}

message ListChartsRequest {
  // Filters to apply when listing charts.
  // Filters are additive; only charts that match all specified filters will be returned.
  message Filters {
    // Filters charts by access permission levels for a specified user.
    // For example, callers can request charts where a user has EDIT access.
    // Callers can also exclude charts where a user has OWNER access.
    .bitdrift.public.unary.admin.v1.AccessPermissionQuery access = 1;

    // An optional view ID to filter charts by. Filtering by view ID will return
    // all charts contained within workflows that belong to that view.
    // If workflow_id is also provided, it will take precedence over view_id.
    optional string view_id = 2 [(validate.rules).string = {
      min_len: 1
      max_len: 100
    }];

    // An optional workflow ID to filter charts by. If provided, it will take precedence over view_id.
    // Filtering by workflow ID will return all charts contained within the specified workflow.
    optional string workflow_id = 3 [(validate.rules).string = {
      min_len: 1
      max_len: 4096
    }];

    // An optional partial chart name to filter charts by. This will return all charts whose names contain the provided string, case-insensitively.
    optional string chart_name = 4 [(validate.rules).string = {max_len: 255}];
  }

  .bitdrift.public.unary.common.v1.Pagination pagination = 1;

  .bitdrift.public.unary.dashboards.v1.ListChartsRequest.Filters filters = 3;
}

message ListChartsResponse {
  repeated .bitdrift.public.unary.dashboards.v1.ResolvedChart charts = 1;

  uint32 total_count = 2;
}

// Provides access to dashboards and chart data, including layout and time series metrics.
service DashboardService {
  // Retrieves a single dashboard by its unique identifier.
  //
  // Returns a list of charts that should be displayed on the dashboard, along
  // with the metadata required to render them. The chart IDs should be used to
  // fetch the data.
  rpc GetDashboard(.bitdrift.public.unary.dashboards.v1.GetDashboardRequest) returns (.bitdrift.public.unary.dashboards.v1.GetDashboardResponse);

  // Lists all dashboards available to the authenticated user.
  rpc ListDashboards(.bitdrift.public.unary.dashboards.v1.ListDashboardsRequest) returns (.bitdrift.public.unary.dashboards.v1.ListDashboardsResponse);

  // Retrieves the chart configuration for a single workflow.
  //
  // Returns a list of all charts to be displayed for this workflow. The chart
  // IDs should be used to fetch the data.
  rpc GetWorkflowCharts(.bitdrift.public.unary.dashboards.v1.GetWorkflowChartsRequest) returns (.bitdrift.public.unary.dashboards.v1.GetWorkflowChartsResponse);

  // Retrieves chart data for one or more charts.
  //
  // Returns rendered chart output such as time-series values, labels, and table rows. For grouped
  // charts, callers can reuse each returned `TimeSeries.id` together with its full `labels` set to
  // build `charts.v1.LimitStrategy.IdentifierMatch` in a later request.
  rpc GetChartsData(.bitdrift.public.unary.dashboards.v1.GetChartsDataRequest) returns (.bitdrift.public.unary.dashboards.v1.GetChartsDataResponse);

  // Gets the unique active devices for a given time range and filter conditions. Active devices in
  // this context are *any* devices that connected to the platform, regardless of whether they sent
  // any metrics, were freshly started, moved to foreground, etc. This includes devices that
  // connected as part of background activity so the number will be higher than "app open" based
  // numbers.
  rpc GetActiveDevices(.bitdrift.public.unary.dashboards.v1.GetActiveDevicesRequest) returns (.bitdrift.public.unary.dashboards.v1.GetActiveDevicesResponse);

  // Returns the distinct platform, app ID, and app version combinations seen in
  // the specified time range.
  rpc GetUniqueAppIds(.bitdrift.public.unary.dashboards.v1.GetUniqueAppIdsRequest) returns (.bitdrift.public.unary.dashboards.v1.GetUniqueAppIdsResponse);

  // Toggles the favorite status of a custom dashboard for the current user.
  rpc FavoriteCustomDashboard(.bitdrift.public.unary.dashboards.v1.FavoriteCustomDashboardRequest) returns (.bitdrift.public.unary.dashboards.v1.FavoriteCustomDashboardResponse);

  // Upserts a custom dashboard.
  rpc UpsertCustomDashboard(.bitdrift.public.unary.dashboards.v1.UpsertCustomDashboardRequest) returns (.bitdrift.public.unary.dashboards.v1.UpsertCustomDashboardResponse);

  // Deletes a custom dashboard.
  rpc DeleteCustomDashboard(.bitdrift.public.unary.dashboards.v1.DeleteCustomDashboardRequest) returns (.bitdrift.public.unary.dashboards.v1.DeleteCustomDashboardResponse);

  // Lists all charts available to the user.
  rpc ListCharts(.bitdrift.public.unary.dashboards.v1.ListChartsRequest) returns (.bitdrift.public.unary.dashboards.v1.ListChartsResponse);
}
