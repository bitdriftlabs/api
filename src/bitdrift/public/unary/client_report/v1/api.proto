syntax = "proto3";

package bitdrift.public.unary.client_report.v1;

import "bitdrift/public/unary/client_report/v1/issues.proto";

service ClientReportService {
  rpc ListIssueGroups(.bitdrift.public.unary.client_report.v1.ListIssueGroupsRequest) returns (.bitdrift.public.unary.client_report.v1.ListIssueGroupsResponse);

  rpc GetIssueGroup(.bitdrift.public.unary.client_report.v1.GetIssueGroupRequest) returns (.bitdrift.public.unary.client_report.v1.GetIssueGroupResponse);

  rpc GetIssue(.bitdrift.public.unary.client_report.v1.GetIssueRequest) returns (.bitdrift.public.unary.client_report.v1.GetIssueResponse);

  rpc ListIssues(.bitdrift.public.unary.client_report.v1.ListIssuesRequest) returns (.bitdrift.public.unary.client_report.v1.ListIssuesResponse);

  rpc GetIssueFeatureFlags(.bitdrift.public.unary.client_report.v1.GetIssueFeatureFlagsRequest) returns (.bitdrift.public.unary.client_report.v1.GetIssueFeatureFlagsResponse);
}
