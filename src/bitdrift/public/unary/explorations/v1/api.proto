syntax = "proto3";

package bitdrift.public.unary.explorations.v1;

import "bitdrift/public/unary/charts/v1/chart_metadata.proto";
import "bitdrift/public/unary/common/v1/common.proto";
import "bitdrift/public/unary/explorations/v1/workflow.proto";
import "google/protobuf/timestamp.proto";
import "validate/validate.proto";

// Manages workflows and their lifecycle, including creation, deployment, and configuration.
//
// Workflows are the core primitive within the bitdrift platform for specifying user
// journeys and collecting telemetry around them. A workflow is made up of a series of
// flows that describe the user journey and rules that specify when users transition
// between flows.
service ExplorationService {
  // Retrieves a workflow by ID.
  //
  // Also updates the last viewed time of the workflow for the current user.
  rpc GetWorkflow(.bitdrift.public.unary.explorations.v1.GetWorkflowRequest) returns (.bitdrift.public.unary.explorations.v1.GetWorkflowResponse);

  // Lists all workflows available to the authenticated user.
  rpc ListWorkflows(.bitdrift.public.unary.explorations.v1.ListWorkflowsRequest) returns (.bitdrift.public.unary.explorations.v1.ListWorkflowsResponse);

  // Creates a new workflow.
  rpc CreateWorkflow(.bitdrift.public.unary.explorations.v1.CreateWorkflowRequest) returns (.bitdrift.public.unary.explorations.v1.CreateWorkflowResponse);

  // Updates a workflow, replacing the existing configuration with the provided definition.
  rpc UpdateWorkflow(.bitdrift.public.unary.explorations.v1.UpdateWorkflowRequest) returns (.bitdrift.public.unary.explorations.v1.UpdateWorkflowResponse);

  // Renames a workflow without modifying any other fields.
  rpc RenameWorkflow(.bitdrift.public.unary.explorations.v1.RenameWorkflowRequest) returns (.bitdrift.public.unary.explorations.v1.RenameWorkflowResponse);

  // Deletes a workflow permanently.
  //
  // This removes the workflow and its configuration from the system. This operation
  // is irreversible.
  rpc DeleteWorkflow(.bitdrift.public.unary.explorations.v1.DeleteWorkflowRequest) returns (.bitdrift.public.unary.explorations.v1.DeleteWorkflowResponse);

  // Deploys a workflow, making it active and able to receive traffic.
  //
  // Deploying creates a new immutable version of the workflow configuration that
  // is recorded in the deployment history.
  rpc DeployWorkflow(.bitdrift.public.unary.explorations.v1.DeployWorkflowRequest) returns (.bitdrift.public.unary.explorations.v1.DeployWorkflowResponse);

  // Stops a running workflow.
  rpc StopWorkflow(.bitdrift.public.unary.explorations.v1.StopWorkflowRequest) returns (.bitdrift.public.unary.explorations.v1.StopWorkflowResponse);

  // Creates or updates chart metadata for a workflow.
  //
  // Chart metadata includes information such as the chart title, description, and
  // the metric query that the chart is based on. This determines how workflow output
  // data is rendered in the UI.
  rpc UpsertWorkflowChartMetadata(.bitdrift.public.unary.charts.v1.UpsertWorkflowChartMetadataRequest) returns (.bitdrift.public.unary.charts.v1.UpsertWorkflowChartMetadataResponse);
}

message FetchCapturedSessionsRequest {
  // The action id for which insights are requested. If this is empty, this will perform a global
  // query against all captured sessions.
  string action_id = 1 [(validate.rules).string = {max_len: 100}];

  // The start time and end time of the captured sessions.
  .bitdrift.public.unary.common.v1.TimeRange time_range = 8;

  // The page number and the number of items per page. The server will use this
  // to paginate the results. Defaults to 1 when not set.
  optional uint64 page = 5;

  // The number of items to return per page. Defaults to 100 when not set.
  optional uint64 per_page = 6 [(validate.rules).uint64 = {
    gte: 1
    lte: 100
  }];
}

message FetchCapturedSessionsResponse {
  message CapturedSession {
    // The unique identifier of the captured session.
    string session_id = 1 [(validate.rules).string = {min_len: 1}];

    // The timestamp of the first log seen for this session.
    .google.protobuf.Timestamp first_seen = 2 [(validate.rules).message = {required: true}];

    // The timestamp of the most recent log seen for this session.
    .google.protobuf.Timestamp last_seen = 7 [(validate.rules).message = {required: true}];

    // The number of times the session was seen. This will always be set to 1 when performing a
    // global search. For a per-action search, it will effectively return the number of trigger logs
    // for the session.
    uint64 count = 4;

    // The fields associated with the captured session. They are similar to the
    // fields in the insights.
    map<string, string> fields = 5;
  }

  // The captured sessions that matched the request.
  repeated .bitdrift.public.unary.explorations.v1.FetchCapturedSessionsResponse.CapturedSession captured_sessions = 2;

  // The full count if all items were returned without pagination. This is artificially limited to
  // the daily flush limit multiplied by the number of days in the time range, rounded up.
  uint32 full_count = 3;
}

// Queries data collected by workflow actions, such as captured sessions.
service WorkflowDataService {
  // Fetches captured sessions matching the given criteria, optionally scoped to a specific action.
  rpc FetchCapturedSessions(.bitdrift.public.unary.explorations.v1.FetchCapturedSessionsRequest) returns (.bitdrift.public.unary.explorations.v1.FetchCapturedSessionsResponse);
}
