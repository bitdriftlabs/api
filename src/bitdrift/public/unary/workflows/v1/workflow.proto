        }
        well_known_fields: {
          key: "startup_launch_mode"
          description: "Activity launch mode."
          type: OOTB_FIELD_TYPE_STRING
          platform: OOTB_FIELD_PLATFORM_ANDROID
        }
        well_known_fields: {
          key: "startup_was_forced_stopped"
          description: "Whether the app was previously force-stopped."
          type: OOTB_FIELD_TYPE_STRING
          platform: OOTB_FIELD_PLATFORM_ANDROID
        }
        well_known_fields: {
          key: "startup_time_to_initial_display_ms"
          description: "Time from process start to first frame, if available."
          type: OOTB_FIELD_TYPE_INT
          unit: "ms"
          platform: OOTB_FIELD_PLATFORM_ANDROID
        }
        well_known_fields: {
          key: "startup_intent_action"
          description: "Intent action that triggered the launch, if present."
          type: OOTB_FIELD_TYPE_STRING
          platform: OOTB_FIELD_PLATFORM_ANDROID
        }
        well_known_fields: {
          key: "_launch_type"
