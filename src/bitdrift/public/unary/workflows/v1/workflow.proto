      // App updates to a new version.
      APP_UPDATE = 10;
      // Device battery state changes.
      BATTERY_STATE_CHANGE = 11 [(.bitdrift.public.shared.annotations.ootb_event_metadata) = {
        well_known_fields: {
          key: "_state"
          description: "Android: \"charging\"/\"unplugged\". iOS: UIDevice battery state string."
          type: OOTB_FIELD_TYPE_STRING
        }
        well_known_fields: {
          key: "_battery_level"
          description: "Battery percentage."
          type: OOTB_FIELD_TYPE_INT
          unit: "percent"
        }
        well_known_fields: {
          key: "_battery_val"
          description: "Battery level as a float."
          type: OOTB_FIELD_TYPE_FLOAT
        }
      }];
      // A GraphQL request starts. Requires supported network instrumentation so the SDK can emit
