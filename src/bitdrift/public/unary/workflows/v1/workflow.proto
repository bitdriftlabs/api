// An action rule.
message ActionRule {
  // ID of this action rule. Must be unique within the workflow. This may be referenced by other
  // APIs and will be documented as such. In special cases it may also be referenced by other
  // actions. For example, a chart and flush action can refer to the rule_id of a measure time
  // action.
  string rule_id = 1 [(validate.rules).string = {
    min_len: 1
    max_len: 100
  }];

  oneof action_rule_type {
    // A metric chart action.
    .bitdrift.public.unary.workflows.v1.Rule.RuleMetricChartConfiguration metric_chart_rule = 2;

    // A flush action.
    .bitdrift.public.unary.workflows.v1.Rule.RuleFlushConfiguration flush_rule = 3;

    // A funnel action.
    .bitdrift.public.unary.workflows.v1.Rule.RuleFunnelConfiguration funnel_rule = 4;

    // A sankey diagram action.
    .bitdrift.public.unary.workflows.v1.Rule.RuleSankeyDiagramConfiguration sankey_diagram_rule = 5;

    // A measure time action.
    .bitdrift.public.unary.workflows.v1.Rule.RuleMeasureTime measure_time_rule = 7;

    // If specified the current session will begin trace sampling.
    .bitdrift.public.unary.workflows.v1.RuleStartTracing start_tracing_rule = 8;
  }
}

message RuleStartTracing {
  // The match ID that when matched will trigger the start of trace sampling.
  string match_id = 1 [(validate.rules).string = {
    min_len: 1
    max_len: 100
  }];
}

message Rule {
  enum OperatingSystem {
    // Unknown operating system. This should never be sent but is here to make
    // sure we don't pick a default one when this field is not set.
    UNKNOWN = 0;
    IOS = 1;
    ANDROID = 2;
    // Universal is the intersection of all operating systems. This is used for
    // events that support all operating systems.
    UNIVERSAL = 3;
  }

  message RuleStateChangeConfiguration {
    // The state change that must be observed to match this rule.
    .bitdrift.public.unary.workflows.v1.LegacyStateChangeMatch state_changes = 1;

    // An array of conditionals that need to match in order to advance in the
    // graph. The first dimension of the conditionals array is the OR'ed, the
    // second dimension is AND'ed. Such that
    // [
    //  [{ lhs: 'A', operator: '==', rhs: 'a', matchType: 'string' },
    //   { lhs: 'B', operator: '==', rhs: 'b', matchType: 'string' }],
    //  [{ lhs: 'A', operator: '==', rhs: 'c', matchType: 'string' }]
    // ]
    //
    // ...means (A==a AND B==b) OR (A==c)
    //
    // Note that this will be executed with the fields available through field providers,
    // so both OOTB and custom fields can be used in the conditionals despite there being
    // no way to pass log fields to state changes.
    //
    // `log` and `log_level` are not available in this context.
    repeated .bitdrift.public.unary.workflows.v1.Conditional conditionals = 2 [(validate.rules).repeated = {max_items: 100}];
  }

  message RuleOOTBConfiguration {
    // An identifier of the event this rule represents. Options are for example:
    // app-launch, app-terminate, etc.
    string event_id = 1 [(validate.rules).string = {max_len: 100}];

    // Operating system this rule is meant to match. The combination of the os
    // and the event_id defines the conditionals that are going to be computed
    // for this rule.
    .bitdrift.public.unary.workflows.v1.Rule.OperatingSystem os = 2 [(validate.rules).enum = {defined_only: true}];

    // An array of conditionals that need to match in order to advance in the
    // graph. The first dimension of the conditionals array is the OR'ed, the
    // second dimension is AND'ed. Such that
    // [
    //  [{ lhs: 'A', operator: '==', rhs: 'a', matchType: 'string' },
    //   { lhs: 'B', operator: '==', rhs: 'b', matchType: 'string' }],
    //  [{ lhs: 'A', operator: '==', rhs: 'c', matchType: 'string' }]
    // ]
    //
    // ...means (A==a AND B==b) OR (A==c)
    repeated .bitdrift.public.unary.workflows.v1.Conditional conditionals = 3 [(validate.rules).repeated = {max_items: 100}];
  }

  message RuleFlushConfiguration {
    // The server-generated ID for this rule action. This can be used to query
    // for sessions that arrive at this rule action.
    string id = 2 [(validate.rules).string = {max_len: 100}];

    // The daily capture limit for the rule. This can come from various sources so returns the source
    // currently in use. i.e. the configured limit (from per_day_limit), the global limit of 100, or from shard config.
    uint32 applied_daily_limit = 8;

    // Points to a step's match ID that will trigger session capture when this flush rule is hit.
    string match_id = 10 [(validate.rules).string = {max_len: 100}];
  }

  message RuleMetricChartConfiguration {
    // A reference to data extracted from a previous rule in the workflow path.
    message DataReference {
      // Points to a step's match ID to extract the value from. If extraction type is measured_time,
      // this must point to a Measure Time rule.
      string match_id = 3 [(validate.rules).string = {max_len: 100}];

      // The value extracted from the log message that advanced the rule. If the oneof is not set,
      // the value 1 is extracted every time, effectively counting the number of occurrences.
      oneof extraction_type {
        // The name of the field to extract the value from.
        string name = 2 [(validate.rules).string = {max_len: 100}];

        // Extract the measured time from a completed Measure Time rule. This can only be set if
        // the match_id points to a Measure Time rule.
        bool measured_time = 4 [(validate.rules).bool.const = true];
      }
    }

    message TimeSeries {
      // A rate metric that is going to be generated for this time series. This
      // is done by emitting simple counters for each of the extracted values
      // and computing the ratio server-side.
      message Rate {
        // The data reference to use for the rate numerator.
        .bitdrift.public.unary.workflows.v1.Rule.RuleMetricChartConfiguration.DataReference numerator = 1 [(validate.rules).message = {required: true}];

        // The data reference to use for the rate denominator.
        .bitdrift.public.unary.workflows.v1.Rule.RuleMetricChartConfiguration.DataReference denominator = 2 [(validate.rules).message = {required: true}];

        // The server-generated ID for this rate metric. This can be used to
        // query for the metric.
        string numerator_id = 3 [(validate.rules).string = {max_len: 100}];

        // The server-generated ID for the denominator metric. This can be used
        // to query for the metric.
        string denominator_id = 4 [(validate.rules).string = {max_len: 100}];

        // An optional group by configuration for the time series. The chart
        // will select a limited number of time series based on a top K lookup
        // of the most relevant time series. If the group by is not set, the
        // generated chart will show the time series as a single line.
        .bitdrift.public.unary.workflows.v1.GroupBy group_by = 5;
      }

      // A histogram metric that is going to be generated for this time series.
      // This is done by emitting histogram values for each value of the
      // extracted value, aggregated server-side.
      message Histogram {
        // The data reference whose values will be recorded in the histogram.
        .bitdrift.public.unary.workflows.v1.Rule.RuleMetricChartConfiguration.DataReference value = 1 [(validate.rules).message = {required: true}];

        // An optional group by configuration for the time series. The chart
        // will select a limited number of time series based on a top K lookup
        // of the most relevant time series. If the group by is not set, the
        // generated chart will show the time series with one line per (P50,
        // P90, P99) percentile.
        .bitdrift.public.unary.workflows.v1.GroupBy group_by = 2;

        // The server-generated ID for this histogram metric. This can be used
        // to query for the metric.
        string id = 3 [(validate.rules).string = {max_len: 100}];
      }

      // A count metric that is going to be generated for this time series. This
      // is done by emitting a counter with the extracted value.
      message Count {
        // The data reference whose values will be emitted into the counter.
        .bitdrift.public.unary.workflows.v1.Rule.RuleMetricChartConfiguration.DataReference value = 1 [(validate.rules).message = {required: true}];

        // An optional group by configuration for the time series. The chart
        // will select a limited number of time series based on a top K lookup
