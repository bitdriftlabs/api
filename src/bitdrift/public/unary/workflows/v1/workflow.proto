      // App moves into the foreground and becomes active.
      APP_FOREGROUND = 5;
      // App launch completes for a new process.
      APP_LAUNCH = 6 [(.bitdrift.public.shared.annotations.ootb_event_metadata) = {
        well_known_fields: {
