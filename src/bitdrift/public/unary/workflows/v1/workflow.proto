message GroupBy {
  message StateValue {
    // The scope of the state value to read when producing the group-by dimension.
    .bitdrift.public.unary.workflows.v1.StateScope scope = 1 [(validate.rules).enum = {
      defined_only: true
      not_in: [0]
    }];

    // The key of the state value to read within the selected scope.
    string key = 2 [(validate.rules).string = {max_len: 100}];
  }

  // One additional dimension to attach to emitted metrics for a chart time series. Exactly one
  // source must be chosen. Each emitted metric will include the extracted value under the
  // resulting dimension name so that value is available alongside the charted series.
  message Value {
    // The source used to populate this group-by dimension.
    oneof group_by_type {
      option (validate.required) = true;
      // The value of the named log field from the event that produced the metric. The field name
      // also becomes the dimension name on the emitted metric.
      string field_key = 1 [(validate.rules).string = {max_len: 100}];

      // The full log message body as the dimension value. This only applies to log events.
      bool log_body = 2;

      // A value read from state using the provided scope and key. The key becomes the dimension
      // name on the emitted metric.
      .bitdrift.public.unary.workflows.v1.GroupBy.StateValue state_value = 3;
    }
  }

  // Additional dimensions to collect for each emitted metric. Each entry adds one dimension. For
  // example, grouping an error-count time series by `error_type` makes that error type value
  // available alongside the charted metric data.
  repeated .bitdrift.public.unary.workflows.v1.GroupBy.Value values = 6 [(validate.rules).repeated = {max_items: 100}];
}

message Workflow {
  enum WorkflowState {
    // The workflow is not currently running and it has not been deployed.
    IDLE = 0;
    // The workflow has been deployed and it’s currently live.
    LIVE = 1;
    // The workflow is in the process of being deployed and it has not reached
    // most live clients yet.
    DEPLOYING = 2;
    // The workflow has been deployed but it has expired and is no longer deployed.
    // This is similar to IDLE but it indicates that the workflow was not explicitly stopped.
    EXPIRED = 3;
  }

  // A unique identifier for the workflow. This is set automatically by the server upon workflow creation and is immutable.
  string id = 1 [(validate.rules).string = {max_len: 100}];

  // A human readable title for the workflow.
  string name = 3 [(validate.rules).string = {max_len: 255}];

  // The flows that make up this workflow. Each flow is a sequence of steps. Flows can be thought of
  // as independent paths through the workflow graph. Each step contains one match rule. Steps can
  // also contain exit conditions that allow resetting to the initial step in the flow based on
  // match rules or timeouts.
  repeated .bitdrift.public.unary.workflows.v1.Flow flows = 27 [(validate.rules).repeated = {max_items: 100}];

  // The actions that make up this workflow. Each action is associated with one or more match IDs
  // that are embedded in the steps of the flows. Individual actions may have restrictions on what
  // referential match IDs they can be associated with. See the documentation for each action type
  // for more details.
  repeated .bitdrift.public.unary.workflows.v1.ActionRule actions = 28 [(validate.rules).repeated = {max_items: 100}];

  // The current deployment state of the workflow.
  .bitdrift.public.unary.workflows.v1.Workflow.WorkflowState state = 7 [(validate.rules).enum = {defined_only: true}];

  // Creation date of the workflow.
  .google.protobuf.Timestamp created_at = 8;

  // Last update date of the workflow.
  .google.protobuf.Timestamp updated_at = 9;

  // The user this workflow belongs to.
  .bitdrift.public.unary.common.v1.Owner owner = 12;

  // Last deploy date of the workflow.
  .google.protobuf.Timestamp deployed_at = 13;

  // The platform targets for this workflow. If empty, this will match _any_ platform.
  repeated .bitdrift.public.shared.platform.v1.Platform platform_targets = 21 [(validate.rules).repeated = {max_items: 100}];

  // Additional group by values that are collected for each collected metric within the workflow.
  repeated string group_by_fields = 22 [(validate.rules).repeated = {max_items: 100}];

  // The time at which the deployment expires based on the deployment_expiration condition.
  // This is set automatically by the server and will be null if the deployment does not expire
  // or if the workflow has not been deployed yet.
  //
  // Note that due to how LastSeen works, reading the workflow data counts as a "last seen" and will reset the
  // expiration time.
  .google.protobuf.Timestamp deployment_expiration_time = 24;
}

// An individual flow within a workflow.
message Flow {
  message ExclusiveFlow {}

  message ParallelFlow {
    // The maximum number of active "runs" for this flow. Defaults to 10 if not specified.
    optional uint32 max_active_runs = 1;
  }

  // The steps that make up this flow.
  repeated .bitdrift.public.unary.workflows.v1.Step steps = 1 [(validate.rules).repeated = {
    min_items: 1
    max_items: 100
  }];

  oneof flow_execution_type {
    // Any match on the initial step causes the flow to reset. This is the default if not
    // specified.
    .bitdrift.public.unary.workflows.v1.Flow.ExclusiveFlow exclusive = 2;

    // Multiple "runs" of the flow can occur in parallel. Runs are replaced FIFO if the active
    // runs exceeds max_active_runs. A new run that matches and extracts the same field values
    // on the initial step as an existing active run will replace the existing run. This
    // execution mode is primarily used for flows that correlate on a specific field value.
    .bitdrift.public.unary.workflows.v1.Flow.ParallelFlow parallel = 3;
  }
}

// A single step within a flow.
message Step {
  // A condition that ends the current run of the flow from this step without advancing to the next
  // step. When an exit condition is met, the current run is discarded and the flow waits to match
  // the first step again.
  message ExitCondition {
    message TimeoutExit {
      // The ID of this timeout exit. Must be unique within the workflow. This ID can be referenced
      // by actions that accept timeout IDs.
      string id = 1 [(validate.rules).string = {
        min_len: 1
        max_len: 100
      }];

      // The timeout condition for this exit path. Timeout exits are terminal: when the timeout
      // elapses, the current run ends instead of advancing to another step.
      .bitdrift.public.unary.workflows.v1.Rule.RuleTimeout timeout_rule = 2;
    }

    // Exactly one way for the step to exit early.
    oneof exit_condition_type {
      // Exit the current run if this match rule fires while the step is active.
      .bitdrift.public.unary.workflows.v1.MatchRule match_rule = 1;

      // Exit the current run if this timeout elapses while the step is active.
      .bitdrift.public.unary.workflows.v1.Step.ExitCondition.TimeoutExit timeout = 2;
    }
  }

  // The step's match rule. This rule must be satisfied to advance to the next step in the flow.
  .bitdrift.public.unary.workflows.v1.MatchRule match_rule = 1;

  // Zero or more early-exit conditions for the step. If any exit condition is met, the current
  // run ends and the flow resets to wait for the first step again.
  repeated .bitdrift.public.unary.workflows.v1.Step.ExitCondition exit_conditions = 2 [(validate.rules).repeated = {max_items: 100}];

  // Describes an optional loop condition that allows looping back to a previous step in the flow.
  // Must point to the match ID in the same step or a step earlier in the flow. Specifying a looping
  // condition is only valid on the last step in the flow *unless* actions contains a Sankey rule
  // that refers to the match ID of this step as one of the nodes.
  optional string loop_match_id = 3 [(validate.rules).string = {max_len: 100}];

  // Fields to save when this step is matched. These fields can be referred to by saved_field_id
  // in a subsequent matcher. The ID of each SaveField must be unique within the flow. This is
  // used for correlation matching in which flow completion is dependent on a particular set of
  // field values being consistent across multiple steps in the flow.
  repeated .bitdrift_public.protobuf.workflow.v1.SaveField save_fields = 4 [(validate.rules).repeated = {max_items: 100}];
}

// A match rule.
message MatchRule {
  // ID of this match rule. Must be unique within the workflow. This is referenced by action
  // rules. See the documentation of individual action rules for restrictions on which match IDs
  // are valid in that context.
  string match_id = 1 [(validate.rules).string = {
    min_len: 1
    max_len: 100
  }];

  oneof match_condition_type {
    // A caller-defined match built from predicates over log fields, log body, saved fields, or
    // state values.
    .bitdrift.public.unary.workflows.v1.GenericMatch generic_match = 2;

    // An out-of-the-box match for common events that don't require custom field extraction. This is
    // used for common app events like app launch, app background, etc.
    .bitdrift.public.unary.workflows.v1.OotbMatch ootb_match = 3;

    // A state change match that looks for changes in the value of a particular state key. This is
    // used for matching on changes in state like connectivity, battery level, etc.
    .bitdrift.public.unary.workflows.v1.StateChangeMatch state_change_match = 4;
  }

  // The % chance that a match will occur if the condition matches. This is the numerator of the
  // percentage, with the denominator being 1,000,000. For example, if the value is 10,000, then 1%
  // of matches will be sampled.
  optional uint32 sample_rate = 5;
}

message StateChangeMatch {
  // Match conditions for the previous state. Leave empty to only match on the new value.
  .bitdrift.public.unary.workflows.v1.StateCondition from = 1;

  // Match conditions for the updated state. Leave empty to only match on the old value.
  .bitdrift.public.unary.workflows.v1.StateCondition to = 2;

  // The scope of the state value being observed.
  .bitdrift.public.unary.workflows.v1.StateScope scope = 3 [(validate.rules).enum = {defined_only: true}];

  // The key of the state value within the given scope.
  string key = 4 [(validate.rules).string = {max_len: 100}];

  // Additional match conditions for this OOTB event. This is an AND in addition to the
  // previously defined event.
  .bitdrift.public.unary.workflows.v1.GenericMatch generic_match = 5;
}

message OotbMatch {
