      // App reached time-to-interactive after launch. Carries the same fields as APP_LAUNCH.
      APP_LAUNCH_TTI = 7;
      // App opens into the foreground, either on a cold start or when reopened from the
      // background.
      APP_OPEN = 8;
      // An app termination is recorded. On Android this includes OS-reported exit information; on
