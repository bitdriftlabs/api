message GenericMatch {
  message GenericMatchCondition {
    message StateKey {
      // The scope of the state key to look up.
      .bitdrift.public.unary.workflows.v1.StateScope scope = 1 [(validate.rules).enum = {defined_only: true}];

      // The key within the given scope to read the value from.
      string key = 2 [(validate.rules).string = {max_len: 100}];
    }

    oneof lhs_type {
      // Match against a log field.
      string log_field = 1 [(validate.rules).string = {max_len: 100}];

      // Match against the log body.
      bool log_body = 2;

      // Match against a JSON path expression inside a log field.
      string log_field_json_path = 3 [(validate.rules).string = {max_len: 255}];

      // A state value specified by the scope and key.
      .bitdrift.public.unary.workflows.v1.GenericMatch.GenericMatchCondition.StateKey state_key = 4;
    }

    // The operator of the conditional.
    .bitdrift.public.unary.workflows.v1.Operator operator = 5 [(validate.rules).enum = {defined_only: true}];

    // Right hand side of the conditional. This is the value we want to match
    // against. Depending on the operator this might be a number, a version, a
    // regular expression, etc.
    oneof rhs_type {
      // A string value to match against.
      string string_value = 6 [(validate.rules).string = {max_len: 512}];

      // A semantic version value to match against.
      string semver_value = 7 [(validate.rules).string = {max_len: 255}];

      // An integer value to match against.
      int32 int_value = 8;

      // A double value to match against.
      double double_value = 9;

      // A reference to a value saved from a previous match rule.
      string saved_field_id = 10 [(validate.rules).string = {max_len: 100}];
    }
  }

  // A list of two or more matchers. Used to allow using a list within a oneof for and/or matching.
  message MatcherList {
    // The child matchers to evaluate together.
    repeated .bitdrift.public.unary.workflows.v1.GenericMatch matchers = 1 [(validate.rules).repeated = {max_items: 100}];
  }

  oneof matcher {
