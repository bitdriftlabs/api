        }
        well_known_fields: {
          key: "_status_code"
          description: "HTTP status code."
          type: OOTB_FIELD_TYPE_INT
        }
        well_known_fields: {
          key: "_result"
          description: "\"success\" or \"failure\". Prefer over _status_code for filtering."
