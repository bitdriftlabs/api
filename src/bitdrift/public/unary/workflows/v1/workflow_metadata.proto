syntax = "proto3";

package bitdrift.public.unary.workflows.v1;

import "bitdrift/public/unary/charts/v1/chart_metadata.proto";
import "google/protobuf/duration.proto";
import "validate/validate.proto";

message WorkflowMetadata {
  message DeploymentExpiration {
    message FixedTime {
      // The duration after which the deployment expires.
      .google.protobuf.Duration time = 1 [(validate.rules).message = {required: true}];
    }

    message LastSeen {
      // The duration after which the deployment expires if the data from the workflow has not been seen for the specified time.
      .google.protobuf.Duration time = 1 [(validate.rules).message = {required: true}];
    }

    oneof condition {
      option (validate.required) = true;
      // The deployment expires after a fixed time.
      .bitdrift.public.unary.workflows.v1.WorkflowMetadata.DeploymentExpiration.FixedTime fixed_time = 1;

      // The deployment expires if the last seen time is older than the specified time.
      .bitdrift.public.unary.workflows.v1.WorkflowMetadata.DeploymentExpiration.LastSeen last_seen = 2;

      // Disables expiration for the deployment.
      bool disabled = 3;
    }
  }

  message PerRuleMetadata {
    // The rule ID this metadata applies to.
    string rule_id = 1 [(validate.rules).string = {max_len: 100}];

    // The rule's title. This is used to display the rule in the workflow graph.
    // Used to increase workflow's readability.
    string title = 2 [(validate.rules).string = {max_len: 255}];
  }

  // The expiration condition for the workflow's deployment. Otherwise known as TTL. If not set
  // the deployment never expires.
  .bitdrift.public.unary.workflows.v1.WorkflowMetadata.DeploymentExpiration deployment_expiration = 1;

  // Metadata that applies to specific rules.
  repeated .bitdrift.public.unary.workflows.v1.WorkflowMetadata.PerRuleMetadata per_rule_metadata = 2 [(validate.rules).repeated = {max_items: 100}];

  // A long-form description for the workflow.
  string description = 32 [(validate.rules).string = {max_len: 1000}];
}

message PerRuleChartMetadata {
  // The rule ID this metadata applies to.
  string rule_id = 1 [(validate.rules).string = {max_len: 100}];

  // The chart metadata.
  .bitdrift.public.unary.charts.v1.ChartMetadata metadata = 2;
}
