package bitdrift.public.unary.alerts.v1;

import "bitdrift/public/shared/workflows/v1/time_series.proto";
import "bitdrift/public/unary/alerts/v1/notifications.proto";
import "bitdrift/public/unary/charts/v1/chart_id.proto";
import "bitdrift/public/unary/common/v1/common.proto";
